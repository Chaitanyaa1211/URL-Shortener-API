apiVersion: apps/v1
kind: Deployment


metadata:
  name: url-shortener-api-depl


spec:

  selector:
    matchLabels:
      app: url-shortener-app


  template:
    metadata:
      labels:
        app: url-shortener-app


    spec:
      containers:
        - name: url-shortner
          image: chaitanyaaaa/url-shortener-api:latest
          ports:
            - containerPort: 3000


