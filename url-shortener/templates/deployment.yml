apiVersion: apps/v1
kind: Deployment


metadata:
  name: {{ .Release.Name }}-api-depl


spec:

  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Release.Name }}-app


  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app


    spec:
      containers:
        - name: url-shortner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}" 
          ports:
            - containerPort: {{ .Values.service.targetPort }}


